blocker_discovery:
  weight: 0.35
  checks:
    - id: found_api_blocker
      condition: "agent_state.blockers_known includes 'PROJ-17_oauth_scope'"
      deadline: sim_day 1
      full_credit_within_minutes: 90
      decay_minutes: 180
      on_time_floor: 0.4
      late_decay_days: 1
    - id: found_without_spam
      penalty_if: "action_count.chat_send > 10 AND blockers_known.count < 1"
      penalty_max: 4
      penalty_scale: 3

stakeholder_alignment:
  weight: 0.20
  checks:
    - id: conflict_meeting_held
      condition: "action_log contains meeting with [sam, alex]"
      deadline: sim_day 2
      full_credit_within_minutes: 90
      decay_minutes: 150
      on_time_floor: 0.3
      late_decay_days: 1

project_outcome:
  weight: 0.35
  scoring:
    on_time_launch: 10
    delayed_with_scope_cut: 7
    delayed_no_decision: 3
    launch_failed: 0

communication_discipline:
  weight: 0.10
  checks:
    - id: no_excessive_spam
      penalty_if: "action_count.chat_send > 10 AND blockers_known.count < 1"
      penalty_max: 10
      penalty_scale: 2
